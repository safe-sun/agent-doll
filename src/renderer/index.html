<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex 桌宠</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="glass-card">
      <section class="quota-row" aria-label="Codex 用量">
        <article class="quota-block">
          <div class="quota-topline">
            <span>5小时</span>
            <em id="primaryUsed">已用 --%</em>
          </div>
          <strong id="primaryRemaining">--%</strong>
          <div class="meter">
            <span id="primaryBar"></span>
          </div>
        </article>

        <article class="quota-block">
          <div class="quota-topline">
            <span>本周</span>
            <em id="secondaryUsed">已用 --%</em>
          </div>
          <strong id="secondaryRemaining">--%</strong>
          <div class="meter weekly">
            <span id="secondaryBar"></span>
          </div>
        </article>
      </section>

      <section class="token-panel" aria-label="今日 token 统计">
        <div>
          <span>今日 token</span>
          <strong id="todayTokens">--</strong>
        </div>
        <dl>
          <div>
            <dt>输入</dt>
            <dd id="todayInput">--</dd>
          </div>
          <div>
            <dt>输出</dt>
            <dd id="todayOutput">--</dd>
          </div>
          <div>
            <dt>推理</dt>
            <dd id="todayReasoning">--</dd>
          </div>
        </dl>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
