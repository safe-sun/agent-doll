<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex 桌宠</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <svg class="svg-filters" aria-hidden="true" focusable="false">
      <filter id="liquid-refraction">
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.018 0.028"
          numOctaves="2"
          seed="8"
          result="noise"
        />
        <feDisplacementMap
          in="SourceGraphic"
          in2="noise"
          scale="5"
          xChannelSelector="R"
          yChannelSelector="G"
        />
      </filter>
    </svg>
    <main class="glass-card">
      <section class="quota-row" aria-label="Codex 用量">
        <article class="quota-block">
          <span>5小时</span>
          <strong id="primaryRemaining">--%</strong>
          <div class="meter">
            <span id="primaryBar"></span>
          </div>
        </article>

        <article class="quota-block">
          <span>本周</span>
          <strong id="secondaryRemaining">--%</strong>
          <div class="meter weekly">
            <span id="secondaryBar"></span>
          </div>
        </article>
      </section>

      <section class="token-panel" aria-label="今日 token 统计">
        <div class="token-total">
          <span>今日总</span>
          <strong id="todayTokens">--</strong>
        </div>
        <dl>
          <div>
            <dt>输入</dt>
            <dd id="todayInput">--</dd>
          </div>
          <div>
            <dt>输出</dt>
            <dd id="todayOutput">--</dd>
          </div>
        </dl>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
